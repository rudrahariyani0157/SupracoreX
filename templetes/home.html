<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupracoreX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #050a19;
            --accent-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--primary-bg);
            color: var(--accent-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transition: var(--transition);
        }

        .navbar.scrolled {
            padding: 15px 60px;
            background: rgba(5, 10, 25, 0.8);
            backdrop-filter: blur(15px);
        }

        /* LOGO */
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent-white);
            text-decoration: none;
            z-index: 1001;
        }

        /* NAVIGATION */
        .nav-wrapper {
            display: flex;
            align-items: center;
        }

        .nav {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-link {
            position: relative;
            color: var(--accent-white);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            opacity: 0.7;
            transition: var(--transition);
        }

        .nav-link:hover {
            opacity: 1;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 2px;
            background: var(--accent-white);
            transition: var(--transition);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* MOBILE MENU TOGGLE */
        #menu-checkbox {
            display: none;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            padding: 10px;
        }

        .menu-toggle span {
            display: block;
            width: 25px;
            height: 2px;
            background: var(--accent-white);
            transition: var(--transition);
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(5, 10, 25, 0.6), rgba(5, 10, 25, 0.6)), 
                        url("https://i.pinimg.com/1200x/b1/58/82/b158825b403e97a91f9704e8091d5ef3.jpg") no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding: 0 120px;
            position: relative;
        }

        .content {
            max-width: 650px;
            z-index: 10;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content h1 {
            font-size: clamp(40px, 8vw, 84px);
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .content p {
            font-size: 18px;
            line-height: 1.6;
            opacity: 0.7;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 16px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            background: var(--accent-white);
            color: var(--primary-bg);
            transition: var(--transition);
            border: 2px solid var(--accent-white);
        }

        .btn:hover {
            background: transparent;
            color: var(--accent-white);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* MOBILE RESPONSIVE STYLES */
        @media (max-width: 991px) {
            .navbar {
                padding: 20px 40px;
            }
            .hero {
                padding: 0 40px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 20px;
                background: rgba(5, 10, 25, 0.9);
                backdrop-filter: blur(10px);
            }

            .menu-toggle {
                display: flex;
            }

            .nav {
                position: fixed;
                top: 0;
                right: -100%;
                width: 100%;
                height: 100vh;
                background: var(--primary-bg);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 30px;
                transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1000;
            }

            #menu-checkbox:checked ~ .nav {
                right: 0;
            }

            /* Hamburger Animation */
            #menu-checkbox:checked ~ .menu-toggle span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            #menu-checkbox:checked ~ .menu-toggle span:nth-child(2) {
                opacity: 0;
            }
            #menu-checkbox:checked ~ .menu-toggle span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .nav-link {
                font-size: 24px;
            }

            .content h1 {
                font-size: 48px;
            }

            .content p {
                font-size: 16px;
            }
        }
    </style>



</head>

<body>

    <nav class="navbar">
        <a class="logo">SupracoreX</a>
        
        <input type="checkbox" id="menu-checkbox">
        <label for="menu-checkbox" class="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <ul class="nav">
            <li><a class="nav-link" href="{% url 'getyourwebsite' %}">Get Your Website</a></li>
            <li><a class="nav-link" href="{% url 'pricing' %}">Pricing</a></li>
            <li><a class="nav-link" href="{% url 'about' %}">About Us</a></li>
            <li><a class="nav-link" href="{% url 'contact' %}">Contact Us</a></li>
            <li><a class="nav-link" href="{% url 'portfolio' %}">Portfolio</a></li>
            <li><a class="nav-link" href="{% url 'service' %}">Services</a></li>
            <li><a class="nav-link" href="{% url 'workedwith' %}">Worked With</a></li>
            <li><a class="nav-link" href=""></a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="content">
            <h1>SupracoreX</h1>
            <p>{{data}}</p>

            <a href="{% url 'getyourwebsite' %}" class="btn">Get Your Website</a>

        </div>
    </section>
    <section>
        <!-- potfolio -->
    </section>
    <section>

    </section>

</body>

</html>

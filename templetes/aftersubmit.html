<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Submission Successful - SupracoreX</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(5, 10, 25, 0.5), rgba(5, 10, 25, 0.5)),
                url("https://i.pinimg.com/1200x/b1/58/82/b158825b403e97a91f9704e8091d5ef3.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            color: white;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(5, 10, 25, 0.4);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            padding: 20px;
        }

        .content h1 {
            font-size: 60px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .content p {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 16px;
            background: white;
            color: black;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #f0f0f0;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 36px;
            }

            .content p {
                font-size: 16px;
            }

            .btn {
                padding: 12px 25px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <!-- HERO -->
    <section class="hero">
        <div class="content">
            <h1>Thank You!</h1>
            <p>Your submission was successful. Explore more below:</p>

            <!-- White buttons -->
            <a href="{% url 'portfolio' %}" class="btn">View Portfolio</a>
            <a href="{% url 'service' %}" class="btn">Our Services</a>
            <a href="{% url 'workedwith' %}" class="btn">Worked With</a>
        </div>
    </section>
</body>

</html>

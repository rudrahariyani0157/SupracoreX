<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .table-container {
            width: 95%;
            margin: auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
        }

        td {
            font-size: 14px;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #eef4ff;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .desc {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .budget {
            font-weight: bold;
            color: #28a745;
        }

        .search-box {
            display: block;
            margin: 20px auto;
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>User Dashboard</h2>

<input type="text" id="search" class="search-box" placeholder="Search..." onkeyup="filterTable()">

<div class="table-container">
<table>
    <thead>
        <tr>
            <th>Select</th>
            <th>Name</th>
            <th>Email</th>
            <th>Mobile Number</th>
            <th>Budget Range</th>
            <th>Description</th>
        </tr>
    </thead>

    <tbody>
        {% for user in userdata %}
        <tr>
            <td><input type="checkbox"></td>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.phone }}</td>
            <td class="budget">{{ user.budget_range }}</td>
            <td class="desc">{{ user.description }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

<script>
function filterTable() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll("tbody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}
</script>

</body>
</html>

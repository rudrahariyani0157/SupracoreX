<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Velora Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #050a19;
            color: white;
        }

        /* NAV */
        .navbar {
            padding: 25px 60px;
            font-size: 26px;
            font-weight: 600;
        }

        /* SECTION */
        .section {
            padding: 40px 60px;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-card h2 {
            font-size: 28px;
        }

        .stat-card p {
            opacity: 0.7;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .search {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #11182e;
            color: white;
        }

        /* LEAD CARD */
        .card {
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* TOP */
        .top {
            display: flex;
            justify-content: space-between;
        }

        /* STATUS */
        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        /* COLORS */
        .new {
            background: #1e90ff;
        }

        .contacted {
            background: #f39c12;
        }

        .closed {
            background: #2ecc71;
        }

        /* MESSAGE */
        .msg {
            margin-top: 10px;
            opacity: 0.8;
        }

        /* ACTIONS */
        .actions {
            margin-top: 15px;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 12px;
        }

        .primary {
            background: white;
            color: black;
        }

        .delete {
            background: #e74c3c;
            color: white;
        }

        /* MOBILE */
        @media(max-width:768px) {
            .section {
                padding: 20px;
            }

            .stats {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">Velora Dashboard</div>

    <div class="section">

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card">
                <h2>{{ total }}</h2>
                <p>Total Leads</p>
            </div>

            <div class="stat-card">
                <h2>{{ new_count }}</h2>
                <p>New Leads</p>
            </div>

            <div class="stat-card">
                <h2>{{ closed_count }}</h2>
                <p>Closed Deals</p>
            </div>
        </div>

        <!-- HEADER -->
        <div class="header">
            <h2>All Leads</h2>
            <input class="search" placeholder="Search clients...">
        </div>

        <!-- DATA -->
        {% for i in data %}
        <div class="card">

            <div class="top">
                <div>
                    <h3>{{ i.name }}</h3>
                    <p style="opacity:0.7;">{{ i.email }}</p>
                </div>

                <span class="status {{ i.status }}">
                    {{ i.status|title }}
                </span>
            </div>

            <div class="msg">
                {{ i.message }}
            </div>

            <div class="actions">
                <button class="btn primary">Update</button>
                <button class="btn delete">Delete</button>
            </div>

        </div>
        {% endfor %}

    </div>

</body>

</html>

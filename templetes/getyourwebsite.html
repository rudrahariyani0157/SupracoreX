<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | SupracoreX</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: url("https://i.pinimg.com/1200x/59/61/38/596138beb239ada8aab67dbb4e288be7.jpg") no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            background: url("https://i.pinimg.com/1200x/59/61/38/596138beb239ada8aab67dbb4e288be7.jpg") no-repeat center/cover;
            
            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px; /* prevents top cut on small screens */
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 25, 0.75);
            top: 0;
            left: 0;
        }

        /* FORM CARD */
        .form-container {
            position: relative;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            z-index: 2;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* INPUT GROUP */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 13px;
            opacity: 0.8;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .input-group textarea {
            height: 120px;
            resize: none;
        }

        .input-group input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* DROPDOWN FIX */
        .input-group.select-group {
            position: relative;
        }

        .input-group.select-group::after {
            content: "▼";
            position: absolute;
            right: 15px;
            top: 60%;
            transform: translateY(-20%);
            font-size: 11px;
            opacity: 0.6;
            pointer-events: none;
        }

        .input-group select {
            padding-right: 40px;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-group select:hover,
        .input-group select:focus {
            background: rgba(255, 255, 255, 0.18);
        }

        select option {
            background: #0b0f1a;
            color: white;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: white;
            color: black;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* MOBILE */
        @media(max-width: 480px) {
            .form-container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Build with SupracoreX</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" name="mobile" placeholder="Enter your number" required>
            </div>

            <div class="input-group select-group">
                <label>Budget Range</label>
                <select name="budget" required>
                    <option value="" disabled selected>Select your budget</option>
                    <option value="3000-5000">₹3,000 - ₹5,000</option>
                    <option value="8000-15000">₹8,000 - ₹15,000</option>
                    <option value="20000+">₹20,000+</option>
                </select>
            </div>

            <div class="input-group">
                <label>What do you want to build?</label>
                <textarea name="project" placeholder="Describe your website or idea..." required></textarea>
            </div>

            <button type="submit" class="btn">Submit Request</button>
        </form>
    </div>

</body>

</html>
